events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:80;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name k1ckoff.duckdns.org;
        client_max_body_size 10M;

        # Let's Encrypt ACME challenge (нужен при первом получении сертификата)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        http2 on;
        server_name k1ckoff.duckdns.org;
        client_max_body_size 10M;

        ssl_certificate     /etc/letsencrypt/live/k1ckoff.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/k1ckoff.duckdns.org/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # API — проксируем на бэкенд (убираем префикс /api)
        location /api/ {
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Загруженные файлы (чеки, фото)
        location /uploads/ {
            alias /uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Mini App (Vue 3)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
